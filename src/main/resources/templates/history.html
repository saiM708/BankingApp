<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>History</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
    <h2>📜 Transaction History</h2>
    <a href="/dashboard">Back to Dashboard</a>
    <table>
        <thead>
        <tr>
            <th>Date</th>
            <th>Type</th>
            <th>Details / Source</th> <th>Amount</th>
            <th>Remaining Balance</th> </tr>
        </thead>
        <tbody>
        <tr th:each="trans : ${transactions}">
            <td th:text="${#temporals.format(trans.timestamp, 'dd-MM-yyyy HH:mm')}">Date</td>
            <td th:text="${trans.type}">Deposit</td>

            <td th:text="${trans.source}" style="color: gray; font-style: italic;">Source</td>

            <td th:text="${'$' + trans.amount}" style="font-weight:bold;">$500</td>

            <td th:text="${'$' + trans.currentBalance}">$1500</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
