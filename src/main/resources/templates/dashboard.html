<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1>👋 Hello, <span th:text="${user.accountHolderName}">User</span></h1>
        <a href="/logout" class="btn-logout">Logout</a>
    </div>

    <div class="card" style="background: #007bff; color: white; text-align: center;">
        <h3>Current Balance</h3>
        <h1 th:text="${'$' + user.accountBalance}">$0.0</h1>
        <p>Account ID: <span th:text="${user.id}">#</span></p>
    </div>

    <div class="grid-container">
        <div class="card">
            <h3>💰 Deposit</h3>
            <form action="/deposit" method="post">
                <input type="number" name="amount" placeholder="Amount" required>
                <button type="submit">Deposit</button>
            </form>
        </div>

        <div class="card">
            <h3>💸 Withdraw</h3>
            <form action="/withdraw" method="post">
                <input type="number" name="amount" placeholder="Amount" required>
                <button type="submit" class="btn-withdraw">Withdraw</button>
            </form>
        </div>

        <div class="card">
            <h3>🔄 Transfer</h3>
            <form action="/transfer" method="post">
                <input type="number" name="toId" placeholder="Receiver Account ID" required>
                <input type="number" name="amount" placeholder="Amount" style="margin-top:5px;" required>
                <button type="submit">Send Money</button>
            </form>
        </div>

        <div class="card" style="display:flex; align-items:center; justify-content:center;">
            <a href="/history" class="btn-history">📜 View Transaction History</a>
        </div>
    </div>
</div>
</body>
</html>
